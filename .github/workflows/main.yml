name: Terraform CI/CD
defaults:
  run:
    working-directory: dev
on:
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Carpeta de Terraform a desplegar"
        required: true
        type: choice
        options:
          - Orion
          - bancolombia
          - ruteandoelmundo
          - coca-cola
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
          - uat
      action:
        description: "Acción de Terraform a ejecutar"
        required: true
        type: choice
        options:
          - apply
          - destroy
# Permisos necesarios para OIDC
permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}-${{ github.event.inputs.working_directory }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_project_name: ${{github.event.inputs.working_directory}}
      TF_VAR_deploy_role_name: ${{ secrets.AWS_ROLE_NAME}}
      WORKING_DIR: ${{ github.event.inputs.working_directory }}/${{ github.event.inputs.environment }}
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      ACTION: ${{ github.event.inputs.action }}
      PROJECT: ${{ github.event.inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: 🔍 DEBUG - Ver estructura del repositorio
        run: |
          echo "📂 Contenido raíz del repositorio:"
          ls -ltr
          echo ""
          echo "📂 Estructura completa (primeros 2 niveles):"
          find . -maxdepth 2 -type d
          echo ""
          echo "🔍 Buscando carpeta: ${{ env.ENVIRONMENT }}"
          if [ -d "${{ env.WORKING_DIR }}" ]; then
            echo "✅ La carpeta ${{ env.ENVIRONMENT }} EXISTE"
            ls -la "${{ env.ENVIRONMENT }}"
          else
            echo "❌ La carpeta ${{ env.ENVIRONMENT }} NO EXISTE"
          fi

      - name: Display configuration
        run: |
          echo "🔧 Configuración del despliegue:"
          echo "  📁 Directorio: ${{ env.WORKING_DIR }}"
          echo "  🌍 Ambiente: ${{ env.ENVIRONMENT }}"
          echo "  ⚡ Acción: ${{ env.ACTION }}"
      - name: 🔍 DEBUG - Verificar estructura del repositorio
        run: |
          echo "📍 Directorio de trabajo: $(pwd)"
          echo "📍 GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo ""
          echo "📂 Estructura del proyecto ${PROJECT}:"
          ls -la "${GITHUB_WORKSPACE}/${PROJECT}/"
          echo ""
          if [ -d "${GITHUB_WORKSPACE}/${PROJECT}/trunk" ]; then
            echo "✅ trunk/ existe"
            echo "📋 Contenido de trunk/:"
            ls -la "${GITHUB_WORKSPACE}/${PROJECT}/trunk/"
          else
            echo "❌ trunk/ NO existe"
          fi

      - name: 🔄 Sync trunk files to environment
        run: |
          echo "🔄 Sincronizando archivos de trunk a ${ENVIRONMENT}..."
          echo ""

          # Usar rutas absolutas
          TRUNK_DIR="${GITHUB_WORKSPACE}/${PROJECT}/trunk"
          ENV_DIR="${GITHUB_WORKSPACE}/${WORKING_DIR}"

          echo "📂 Rutas:"
          echo "   Trunk:   ${TRUNK_DIR}"
          echo "   Destino: ${ENV_DIR}"
          echo ""

          # Verificar trunk
          if [ ! -d "$TRUNK_DIR" ]; then
            echo "⚠️  Carpeta trunk no existe, omitiendo sincronización"
            exit 0
          fi

          echo "✅ Carpeta trunk encontrada"
          echo ""

          # Listar archivos .tf
          echo "📋 Archivos .tf en trunk:"
          find "$TRUNK_DIR" -maxdepth 1 -name "*.tf" -type f -exec basename {} \; 2>/dev/null | sort
          echo ""

          # Contar
          TF_COUNT=$(find "$TRUNK_DIR" -maxdepth 1 -name "*.tf" -type f | wc -l)
          echo "📊 Total: $TF_COUNT archivos"
          echo ""

          if [ "$TF_COUNT" -eq 0 ]; then
            echo "⚠️  No hay archivos .tf en trunk"
            exit 0
          fi

          # Copiar
          echo "🔄 Iniciando copia..."
          COPIED=0
          SKIPPED=0

          for file in "$TRUNK_DIR"/*.tf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              dest="${ENV_DIR}/${filename}"
              
              if [ ! -f "$dest" ]; then
                echo "  📋 ${filename}"
                cp "$file" "$dest"
                COPIED=$((COPIED + 1))
              else
                echo "  ⏭️  ${filename} (existe)"
                SKIPPED=$((SKIPPED + 1))
              fi
            fi
          done

          echo ""
          echo "✅ Sincronización completa"
          echo "   Copiados: $COPIED | Omitidos: $SKIPPED"

      - name: 📂 Verificar archivos en destino
        run: |
          echo "📂 Archivos en ${WORKING_DIR}:"
          ls -lh "${GITHUB_WORKSPACE}/${WORKING_DIR}/"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHA-${{ env.ENVIRONMENT }}-${{ github.run_number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve
