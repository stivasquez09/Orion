name: Terraform CI/CD
defaults:
  run:
    working-directory: dev
on:
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Carpeta de Terraform a desplegar"
        required: true
        type: choice
        options:
          - Orion
          - bancolombia
          - ruteandoelmundo
          - coca-cola
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
          - uat
      action:
        description: "Acción de Terraform a ejecutar"
        required: true
        type: choice
        options:
          - apply
          - destroy
# Permisos necesarios para OIDC
permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}-${{ github.event.inputs.working_directory }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_project_name: ${{github.event.inputs.working_directory}}
      TF_VAR_deploy_role_name: ${{ secrets.AWS_ROLE_NAME}}
      WORKING_DIR: ${{ github.event.inputs.working_directory }}
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      ACTION: ${{ github.event.inputs.action }}
      PROJECT: ${{ github.event.inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: 🔍 DEBUG - Ver estructura del repositorio
        run: |
          echo "📂 Contenido raíz del repositorio:"
          ls -la
          pwd
          echo ""
          echo "📂 Estructura completa (primeros 2 niveles):"
          find . -maxdepth 2 -type d
          echo ""
          echo "🔍 Buscando carpeta: ${{ env.WORKING_DIR }}"
          if [ -d "${{ env.WORKING_DIR }}" ]; then
            echo "✅ La carpeta ${{ env.WORKING_DIR }} EXISTE"
            ls -la "${{ env.WORKING_DIR }}"
          else
            echo "❌ La carpeta ${{ env.WORKING_DIR }} NO EXISTE"
          fi

      - name: Display configuration
        run: |
          echo "🔧 Configuración del despliegue:"
          echo "  📁 Directorio: ${{ env.WORKING_DIR }}"
          echo "  🌍 Ambiente: ${{ env.ENVIRONMENT }}"
          echo "  ⚡ Acción: ${{ env.ACTION }}"
      - name: 🔍 DEBUG - Ver estructura
        run: |
          echo "📍 Directorio actual: $(pwd)"
          echo ""
          echo "📂 Contenido raíz:"
          ls -la
          echo ""
          echo "📂 Contenido de ${PROJECT}:"
          ls -la "${PROJECT}/"

      - name: 🔄 Sync trunk files to environment
        run: |
          echo "🔄 Sincronizando archivos de trunk a ${ENVIRONMENT}..."
          echo ""

          TRUNK_DIR="${PROJECT}/trunk"
          ENV_DIR="${PROJECT}/${ENVIRONMENT}"

          echo "📂 Trunk:   ${TRUNK_DIR}"
          echo "📂 Destino: ${ENV_DIR}"
          echo ""

          if [ ! -d "$TRUNK_DIR" ]; then
            echo "⚠️  Trunk no existe, omitiendo"
            exit 0
          fi

          echo "✅ Trunk encontrado"
          echo ""

          COPIED=0
          for file in "$TRUNK_DIR"/*.tf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              
              if [ ! -f "${ENV_DIR}/${filename}" ]; then
                echo "  📋 ${filename}"
                cp "$file" "${ENV_DIR}/${filename}"
                COPIED=$((COPIED + 1))
              else
                echo "  ⏭️  ${filename}"
              fi
            fi
          done

          echo ""
          echo "✅ Copiados: ${COPIED}"
          echo ""
          echo "📂 Archivos en ${ENV_DIR}:"
          ls -lh "${ENV_DIR}/"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHA-${{ env.ENVIRONMENT }}-${{ github.run_number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve
